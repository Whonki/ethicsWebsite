<!DOCTYPE html>
<html>

<head>
    <title>Ethics Website</title>
    <link rel="stylesheet" href="./stylesheet.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" charset="UTF-8">
</head>

<body class="page bg-image">
    <header>
        <nav>
            <ul>
                <tittle>PHIL314</tittle> <!-- This title is completely optional. -->
                <a href="#introduction" data-nav>Introduction</a>
                <a href="#analysis" data-nav>Analysis</a>
                <a href="#arguments" data-nav>Arguments</a>
                <a href="#sources" data-nav>Sources</a>
            </ul>
        </nav>
    </header>
    <!-- The non-embedded section. -->
    <div class="title-page">
        <h1>Ethics: Social Media Access and Age Restrictions</h1>
    </div>

    <!-- The embedded sections. -->
    <section id="introduction" class="embed-section">
        <iframe data-embed="true" data-embed-id="introduction" src="introduction.html?embed=introduction"
            title="Introduction" scrolling="no"></iframe>
    </section>
    <section id="analysis" class="embed-section embed-section--clip">
        <div class="embed-frame">
            <iframe data-embed="true" data-embed-id="analysis" src="analysis.html?embed=analysis" title="Analysis"
                scrolling="no"></iframe>
        </div>
    </section>
    <section id="arguments" class="embed-section">
        <iframe data-embed="true" data-embed-id="arguments" src="arguments.html?embed=arguments" title="Arguments"
            scrolling="no"></iframe>
    </section>
    <section id="sources" class="embed-section">
        <iframe data-embed="true" data-embed-id="sources" src="sources.html?embed=sources" title="Sources"
            scrolling="no"></iframe>
    </section>

    <!-- DO NOT TOUCH!  -->
    <script>
        (function () {
            var header = document.querySelector("header");
            var links = document.querySelectorAll("nav a[data-nav]");
            var sections = document.querySelectorAll(".embed-section");
            var iframes = document.querySelectorAll("iframe[data-embed='true']");

            // To identify which header is currently active.
            function activeSectionId() {
                var navH = header.offsetHeight;
                var y = window.scrollY + navH + 32;
                var active = "top";
                sections.forEach(function (sec) {
                    if (sec.offsetTop <= y) active = sec.id;
                });
                return active;
            }
            // Changes the Nav bar activity based on what the header is
            function syncNavAndHeader() {
                var active = activeSectionId();
                header.dataset.activeSection = active;
                links.forEach(function (a) {
                    a.removeAttribute("id");
                    if (active !== "top" && a.getAttribute("href") === "#" + active) {
                        a.id = "active";
                    }
                });
            }

            function measureIframeDocHeight(doc) {
                var b = doc.body;
                var e = doc.documentElement;
                if (!b || !e) return 0;
                return Math.max(
                    b.scrollHeight,
                    e.scrollHeight,
                    b.offsetHeight,
                    e.offsetHeight
                );
            }

            // Resize iframes to match embedded document height (fonts / lists need offsetHeight + postMessage).
            function resizeIframeToContent(iframe) {
                try {
                    var doc = iframe.contentDocument || iframe.contentWindow.document;
                    if (!doc) return;
                    var height = measureIframeDocHeight(doc);
                    if (height > 0) {
                        var newH = Math.ceil(height) + 2;
                        var curH = parseFloat(iframe.style.height) || 0;
                        if (Math.abs(curH - newH) > 2) {
                            iframe.style.height = newH + "px";
                        }
                    }
                } catch (e) {
                    /* same-origin only */
                }
            }

            function resizeAllIframes() {
                iframes.forEach(function (iframe) {
                    resizeIframeToContent(iframe);
                });
            }

            if (document.fonts && document.fonts.ready) {
                document.fonts.ready.then(function () {
                    resizeAllIframes();
                    requestAnimationFrame(resizeAllIframes);
                });
            }

            iframes.forEach(function (iframe) {
                // Initial sizing once content is ready.
                iframe.addEventListener("load", function () {
                    resizeIframeToContent(iframe);
                    // Re-sync nav after layout changes.
                    requestAnimationFrame(syncNavAndHeader);
                });
            });

            window.addEventListener("resize", function () {
                iframes.forEach(function (iframe) {
                    resizeIframeToContent(iframe);
                });
                syncNavAndHeader();
            });

            // Allow embedded pages to request height updates after async layout changes.
            window.addEventListener("message", function (event) {
                var data = event && event.data;
                if (!data || data.type !== "iframe-resize" || !data.embedId) return;
                var iframe = document.querySelector("iframe[data-embed-id='" + data.embedId + "']");
                if (!iframe) return;
                if (typeof data.height === "number" && data.height > 0) {
                    var newH = Math.ceil(data.height) + 2;
                    var curH = parseFloat(iframe.style.height) || 0;
                    if (Math.abs(curH - newH) > 2) {
                        iframe.style.height = newH + "px";
                        requestAnimationFrame(syncNavAndHeader);
                    }
                }
            });

            // Syncing nav bar + header
            window.addEventListener("scroll", syncNavAndHeader, { passive: true });
            window.addEventListener("hashchange", syncNavAndHeader);
            window.addEventListener("load", function () {
                requestAnimationFrame(syncNavAndHeader);
                // In case load events happened before listeners or caching.
                resizeAllIframes();
            });
            syncNavAndHeader();
        })();
    </script>
</body>

</html>
